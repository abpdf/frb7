name: Build Flutter Rust App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CRATE_NAME: frb7     # 与 Cargo.toml 中的 crate 名称一致

jobs:
  generate-bridge:
    name: Generate FFI Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. Flutter 3.19.6
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # 2. Rust 1.77.2
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.77.2
          override: true

      # 3. 配置 crates.io 镜像为 abpdf（所有依赖从此拉取）
      - name: Configure cargo registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml <<EOF
          [source.crates-io]
          replace-with = "abpdf"
          [source.abpdf]
          registry = "https://github.com/abpdf/crates.io-index"
          EOF

      # 4. 从 GitHub 安装 flutter_rust_bridge_codegen（不经过 crates.io）
      - name: Install flutter_rust_bridge_codegen from GitHub
        run: |
          git clone --depth 1 https://github.com/fzyzcjy/flutter_rust_bridge.git
          cd flutter_rust_bridge/flutter_rust_codegen
          cargo install --path .

      # 5. 生成桥接代码（路径请根据项目调整）
      - name: Run code generator
        run: flutter_rust_bridge_codegen --help

      # 6. 提交并推送生成的代码（覆盖仓库）
      - name: Commit and push generated code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate Flutter Rust Bridge code [skip ci]"
            git push
          fi
