name: Build Flutter Rust App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CRATE_NAME: frb7     # 与 Cargo.toml 中的 crate 名称一致

jobs:
  generate-bridge:
    name: Generate FFI Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. Flutter 3.19.6
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # 2. Rust 1.77.2（生成器可能仍需 rustc 解析项目结构）
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.77.2
          override: true

      # 3. 配置 crates.io 镜像（备用，非必须）
      - name: Configure cargo registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml <<EOF
          [source.crates-io]
          replace-with = "abpdf"
          [source.abpdf]
          registry = "https://github.com/abpdf/crates.io-index"
          EOF

      # 4. 下载预编译的 flutter_rust_bridge_codegen v2.0.0
      - name: Download flutter_rust_bridge_codegen binary
        run: |
          wget -O frb.tgz https://github.com/fzyzcjy/flutter_rust_bridge/releases/download/v2.0.0/flutter_rust_bridge_codegen-x86_64-unknown-linux-gnu-v2.0.0.tgz
          tar -xzf frb.tgz
          chmod +x flutter_rust_bridge_codegen
          sudo mv flutter_rust_bridge_codegen /usr/local/bin/

      # 5. 使用 create 子命令生成桥接代码（v2.0.0 支持）
      - name: Generate bridge with 'create'
        run: |
          flutter_rust_bridge_codegen create ${{ env.CRATE_NAME }}

      # 6. 提交并推送生成的代码（覆盖仓库）
      - name: Commit and push generated code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate Flutter Rust Bridge code [skip ci]"
            git push
          fi
